version: 1
match_mode: normalized_substring
required_claims:
  - fact_a
  - fact_b
precedence:
  - when_missing: fact_a
    status: rejected
    code: REJECTED_MISSING_FACT_A
  - when_missing: fact_b
    status: rejected
    code: REJECTED_MISSING_FACT_B
  - when_missing: null
    status: booked
    code: MEETING_BOOKED
fixed_responses:
  REJECTED_MISSING_FACT_A: "Uh, honestly, this still feels pretty generic. I don't think you know enough about our business yet, so I'm going to pass."
  REJECTED_MISSING_FACT_B: "Mm, okay, but you haven't actually looked at our website, have you? I think I'm going to pass for now."
  MEETING_BOOKED: "Yeah, okay, that actually sounds useful. Send me a 20-minute invite for Tuesday at 2 PM."
